apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: platform
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus.platform.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: platform
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: ChatSentry
        type: file
        disableDeletion: false
        allowUiUpdates: true
        options:
          path: /etc/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: platform
data:
  chatsentry.json: |
    {
      "title": "ChatSentry Platform",
      "uid": "chatsentry-main",
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1, "gridPos": {"x": 0, "y": 0, "w": 24, "h": 5},
          "title": "Service Health",
          "type": "stat",
          "options": {"colorMode": "background", "reduceOptions": {"calcs": ["lastNotNull"]}},
          "fieldConfig": {"defaults": {"mappings": [{"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}, "1": {"text": "UP", "color": "green"}}}]}},
          "targets": [
            {"expr": "kube_pod_status_ready{namespace=~\"platform|zulip\", condition=\"true\"}", "legendFormat": "{{pod}}", "instant": true}
          ]
        },
        {
          "id": 3, "gridPos": {"x": 0, "y": 5, "w": 12, "h": 4},
          "title": "Moderation Request Rate (req/s)",
          "type": "stat",
          "targets": [{"expr": "sum(rate(http_requests_total{job=\"inference\",handler=\"/moderate\"}[5m]))", "legendFormat": "req/s"}],
          "options": {"colorMode": "value"}
        },
        {
          "id": 16, "gridPos": {"x": 12, "y": 5, "w": 12, "h": 4},
          "title": "Training Job Status",
          "type": "stat",
          "options": {"colorMode": "background"},
          "targets": [
            {"expr": "kube_job_status_active{namespace=\"platform\"}", "legendFormat": "{{job_name}} active"},
            {"expr": "kube_job_status_succeeded{namespace=\"platform\"}", "legendFormat": "{{job_name}} succeeded"},
            {"expr": "kube_job_status_failed{namespace=\"platform\"}", "legendFormat": "{{job_name}} failed"}
          ]
        },
        {
          "id": 5, "gridPos": {"x": 0, "y": 9, "w": 12, "h": 8},
          "title": "Moderation Actions Over Time",
          "type": "timeseries",
          "targets": [
            {"expr": "rate(inference_action_total{action=\"ALLOW\"}[5m])", "legendFormat": "ALLOW"},
            {"expr": "rate(inference_action_total{action=\"WARN_AND_OBSCURE\"}[5m])", "legendFormat": "WARN"},
            {"expr": "rate(inference_action_total{action=\"HIDE_AND_STRIKE\"}[5m])", "legendFormat": "HIDE"},
            {"expr": "rate(inference_action_total{action=\"ALERT_ADMIN\"}[5m])", "legendFormat": "ALERT"}
          ]
        },
        {
          "id": 6, "gridPos": {"x": 12, "y": 9, "w": 12, "h": 8},
          "title": "Inference Latency Percentiles (ms)",
          "type": "timeseries",
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(inference_latency_ms_bucket[5m])) by (le))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum(rate(inference_latency_ms_bucket[5m])) by (le))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum(rate(inference_latency_ms_bucket[5m])) by (le))", "legendFormat": "p99"}
          ]
        },
        {
          "id": 7, "gridPos": {"x": 0, "y": 17, "w": 12, "h": 8},
          "title": "Toxicity Score Distribution",
          "type": "timeseries",
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(inference_toxicity_score_bucket[5m])) by (le))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum(rate(inference_toxicity_score_bucket[5m])) by (le))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum(rate(inference_toxicity_score_bucket[5m])) by (le))", "legendFormat": "p99"}
          ]
        },
        {
          "id": 8, "gridPos": {"x": 12, "y": 17, "w": 12, "h": 8},
          "title": "Self-Harm Score Distribution",
          "type": "timeseries",
          "targets": [
            {"expr": "histogram_quantile(0.50, sum(rate(inference_self_harm_score_bucket[5m])) by (le))", "legendFormat": "p50"},
            {"expr": "histogram_quantile(0.95, sum(rate(inference_self_harm_score_bucket[5m])) by (le))", "legendFormat": "p95"},
            {"expr": "histogram_quantile(0.99, sum(rate(inference_self_harm_score_bucket[5m])) by (le))", "legendFormat": "p99"}
          ]
        },
        {
          "id": 11, "gridPos": {"x": 0, "y": 25, "w": 24, "h": 8},
          "title": "HTTP Request Rate by Endpoint",
          "type": "timeseries",
          "targets": [
            {"expr": "rate(http_requests_total{job=\"inference\",handler=\"/moderate\"}[5m])", "legendFormat": "{{method}} {{handler}} {{status}}"}
          ]
        },
        {
          "id": 13, "gridPos": {"x": 0, "y": 33, "w": 8, "h": 8},
          "title": "Node CPU Usage %",
          "type": "timeseries",
          "targets": [
            {"expr": "100 - (avg by(node) (rate(node_cpu_seconds_total{mode=\"idle\",job=~\"node-exporter.*\"}[5m])) * 100)", "legendFormat": "{{node}}"}
          ]
        },
        {
          "id": 14, "gridPos": {"x": 8, "y": 33, "w": 8, "h": 8},
          "title": "Node Memory Usage %",
          "type": "timeseries",
          "targets": [
            {"expr": "100 - (avg by(node) (node_memory_MemAvailable_bytes{job=~\"node-exporter.*\"}) / avg by(node) (node_memory_MemTotal_bytes{job=~\"node-exporter.*\"}) * 100)", "legendFormat": "{{node}}"}
          ]
        },
        {
          "id": 15, "gridPos": {"x": 16, "y": 33, "w": 8, "h": 8},
          "title": "Node Disk Usage %",
          "type": "timeseries",
          "targets": [
            {"expr": "100 - (avg by(node) (node_filesystem_avail_bytes{job=~\"node-exporter.*\",mountpoint=\"/\",fstype!=\"tmpfs\"}) / avg by(node) (node_filesystem_size_bytes{job=~\"node-exporter.*\",mountpoint=\"/\",fstype!=\"tmpfs\"}) * 100)", "legendFormat": "{{node}}"}
          ]
        }
      ],
      "schemaVersion": 36
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /etc/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: platform
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
