# ── Training Job ──────────────────────────────────────────────────────────────
# Runs the ML training pipeline as a one-shot Kubernetes Job on the GPU node.
#
# Flow (mirrors scripts/retrain_latest.sh):
#   1. init container: downloads latest versioned dataset from Chameleon S3
#   2. init container: fetches approved checkpoint (if exists) for resume training
#   3. main container: runs train.py — logs metrics + model artifact to MLflow
#   4. main container: if quality gate passes, promotes best_model.pt back to S3
#
# Prerequisites:
#   1. Build and push the trainer image (ROCm — use Dockerfile.training at repo root):
#        docker buildx build --platform linux/amd64 -f Dockerfile.training \
#          -t kichanitish/zulip-moderation-trainer:latest --push .
#   2. Upload versioned training data to Chameleon S3:
#        aws s3 cp train.csv s3://proj09-data/zulip-training-data/v<YYYYMMDD-HHMMSS>/train.csv \
#          --endpoint-url https://chi.tacc.chameleoncloud.org:7480
#        (same for val.csv, test.csv)
#
# To trigger a training run:
#   kubectl apply -f training-job.yaml
#
# To re-run (Jobs are immutable after completion):
#   kubectl delete job zulip-moderation-training -n platform
#   kubectl apply -f training-job.yaml
#
# To monitor:
#   kubectl logs -n platform -l job-name=zulip-moderation-training -f
# ─────────────────────────────────────────────────────────────────────────────

apiVersion: v1
kind: ConfigMap
metadata:
  name: training-config
  namespace: platform
data:
  # Which experiment config and run to execute (matches configs/experiments.yaml)
  experiment_config: "configs/experiments.yaml"
  run_name: "hatebert_multihead"
  mlflow_experiment_name: "zulip_moderation_bot_training"
  # Chameleon S3 buckets (must exist — created by post_k8s.yml or manually)
  s3_data_bucket: "proj09_Data"
  s3_data_prefix: "zulip-training-data"
  s3_model_bucket: "proj09_object_store"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: zulip-moderation-training
  namespace: platform
  labels:
    app: zulip-moderation-trainer
spec:
  # Do not restart on failure — fix the issue and re-apply
  backoffLimit: 0
  # Clean up completed/failed job pods after 1 hour
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: zulip-moderation-trainer
    spec:
      restartPolicy: Never

      # Pin to GPU node — which carries the dedicated=gpu:NoSchedule taint.
      nodeSelector:
        dedicated: gpu
      tolerations:
        - key: dedicated
          value: gpu
          effect: NoSchedule

      # ── Init containers run sequentially before training ─────────────────────
      initContainers:

        # Step 1: Download the latest versioned dataset from Chameleon S3.
        # Folder pattern: s3://<bucket>/<prefix>/v<YYYYMMDD-HHMMSS>/
        # Outputs: /data/v<version>/train.csv, val.csv, test.csv
        - name: fetch-data
          image: amazon/aws-cli:2.22.35
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              LATEST=$(aws s3 ls s3://$S3_DATA_BUCKET/$S3_DATA_PREFIX/ \
                --endpoint-url $S3_ENDPOINT_URL \
                | awk '{print $2}' \
                | grep -E '^v[0-9]{8}' \
                | sort | tail -1 | tr -d '/')

              if [ -z "$LATEST" ]; then
                echo "ERROR: No versioned dataset found at s3://$S3_DATA_BUCKET/$S3_DATA_PREFIX/"
                exit 1
              fi

              echo "Downloading dataset: $LATEST"
              aws s3 cp s3://$S3_DATA_BUCKET/$S3_DATA_PREFIX/$LATEST/ /data/$LATEST/ \
                --endpoint-url $S3_ENDPOINT_URL --recursive

              if [ ! -f "/data/$LATEST/train.csv" ]; then
                echo "ERROR: train.csv not found after download"
                exit 1
              fi

              echo "Dataset ready at /data/$LATEST/"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_SECRET_KEY
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: S3_ENDPOINT_URL
              value: "https://chi.tacc.chameleoncloud.org:7480"
            - name: S3_DATA_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: training-config
                  key: s3_data_bucket
            - name: S3_DATA_PREFIX
              valueFrom:
                configMapKeyRef:
                  name: training-config
                  key: s3_data_prefix
          volumeMounts:
            - name: training-data
              mountPath: /data

        # Step 2: Fetch the currently approved model checkpoint for resume training.
        # If no checkpoint exists (first run), training starts from scratch.
        - name: fetch-checkpoint
          image: amazon/aws-cli:2.22.35
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              if aws s3 ls s3://$S3_MODEL_BUCKET/best_model.pt \
                  --endpoint-url $S3_ENDPOINT_URL >/dev/null 2>&1; then
                echo "Fetching approved checkpoint..."
                aws s3 cp s3://$S3_MODEL_BUCKET/best_model.pt /checkpoints/best_model.pt \
                  --endpoint-url $S3_ENDPOINT_URL
                echo "Checkpoint ready at /checkpoints/best_model.pt"
              else
                echo "No approved checkpoint found — training from scratch"
              fi
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_SECRET_KEY
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: S3_ENDPOINT_URL
              value: "https://chi.tacc.chameleoncloud.org:7480"
            - name: S3_MODEL_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: training-config
                  key: s3_model_bucket
          volumeMounts:
            - name: checkpoints
              mountPath: /checkpoints

      # ── Main training container ───────────────────────────────────────────────
      containers:
        - name: trainer
          image: kichanitish/zulip-moderation-trainer:latest
          imagePullPolicy: Always

          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail

              echo "=== Starting training run: $RUN_NAME ==="
              python -u scripts/train.py --config $EXPERIMENT_CONFIG --run $RUN_NAME

              echo "=== Training complete. Checking quality gate... ==="
              QUALITY_GATE="/workspace/outputs/$RUN_NAME/quality_gate.json"
              BEST_MODEL="/workspace/outputs/$RUN_NAME/best_model.pt"

              if [ -f "$QUALITY_GATE" ] && grep -q '"passed":[[:space:]]*true' "$QUALITY_GATE"; then
                echo "Quality gate PASSED — promoting model to object store"
                pip install awscli -q
                SESSION_NAME="retraining_$(date +%F_%H-%M-%S)"
                # Overwrite current approved model
                AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY \
                AWS_SECRET_ACCESS_KEY=$S3_SECRET_KEY \
                aws s3 cp "$BEST_MODEL" s3://$S3_MODEL_BUCKET/best_model.pt \
                  --endpoint-url $S3_ENDPOINT_URL
                # Save versioned backup
                AWS_ACCESS_KEY_ID=$S3_ACCESS_KEY \
                AWS_SECRET_ACCESS_KEY=$S3_SECRET_KEY \
                aws s3 cp "$BEST_MODEL" \
                  s3://$S3_MODEL_BUCKET/model_backups/$SESSION_NAME/$RUN_NAME/best_model.pt \
                  --endpoint-url $S3_ENDPOINT_URL
                echo "Model promoted: s3://$S3_MODEL_BUCKET/best_model.pt"
              else
                echo "Quality gate NOT passed — model not promoted to object store"
              fi

          env:
            # ── Training config (from ConfigMap) ─────────────────────────────
            - name: EXPERIMENT_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: training-config
                  key: experiment_config
            - name: RUN_NAME
              valueFrom:
                configMapKeyRef:
                  name: training-config
                  key: run_name

            # ── MLflow tracking ───────────────────────────────────────────────
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow.platform.svc.cluster.local:5000"
            - name: MLFLOW_EXPERIMENT_NAME
              valueFrom:
                configMapKeyRef:
                  name: training-config
                  key: mlflow_experiment_name

            # ── Checkpoint resumption (populated by fetch-checkpoint init container) ──
            - name: RESUME_FROM_CHECKPOINT
              value: "/workspace/checkpoints/best_model.pt"

            # ── ROCm / AMD GPU visibility ─────────────────────────────────────
            - name: HIP_VISIBLE_DEVICES
              value: "all"

            # ── S3 for model promotion after quality gate ─────────────────────
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_ACCESS_KEY
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: chatsentry-credentials
                  key: S3_SECRET_KEY
            - name: S3_ENDPOINT_URL
              value: "https://chi.tacc.chameleoncloud.org:7480"
            - name: S3_MODEL_BUCKET
              valueFrom:
                configMapKeyRef:
                  name: training-config
                  key: s3_model_bucket

          resources:
            requests:
              cpu: 2000m
              memory: 8Gi
              amd.com/gpu: "1"
            limits:
              cpu: 4000m
              memory: 16Gi
              amd.com/gpu: "1"

          volumeMounts:
            # Data downloaded by fetch-data init container
            - name: training-data
              mountPath: /workspace/retraining-data
              readOnly: true
            # Checkpoint downloaded by fetch-checkpoint init container
            - name: checkpoints
              mountPath: /workspace/checkpoints
              readOnly: true
            # Writable scratch space for outputs before MLflow upload
            - name: outputs
              mountPath: /workspace/outputs

      volumes:
        - name: training-data
          emptyDir: {}
        - name: checkpoints
          emptyDir: {}
        - name: outputs
          emptyDir: {}
