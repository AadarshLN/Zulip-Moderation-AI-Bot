apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inference
  template:
    metadata:
      labels:
        app: inference
    spec:
      containers:
        - name: inference
          image: kichanitish/inference:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          # Model loading (hateBERT download + quantization) takes ~60-90s on first start.
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: 2000m
              memory: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: inference
  namespace: platform
spec:
  selector:
    app: inference
  ports:
    - port: 8000
      targetPort: 8000
