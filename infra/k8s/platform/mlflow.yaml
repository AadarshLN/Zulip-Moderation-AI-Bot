apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        # Wait for PostgreSQL before starting MLflow
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres.zulip.svc.cluster.local 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.1.0
          command:
            - /bin/sh
            - -c
            - |
              pip install psycopg2-binary boto3 --quiet && \
              mlflow server \
                --backend-store-uri postgresql://mlflow_user:${MLFLOW_POSTGRES_PASSWORD}@postgres.zulip.svc.cluster.local:5432/mlflow \
                --artifacts-destination s3://mlflow-artifacts \
                --serve-artifacts \
                --host 0.0.0.0 \
                --port 5000
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-credentials
                  key: MLFLOW_POSTGRES_PASSWORD
            # Chameleon EC2 credentials — used as AWS-compatible S3 keys for Swift
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: mlflow-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: mlflow-credentials
                  key: AWS_SECRET_ACCESS_KEY
            # Substituted by Ansible post_k8s.yml from group_vars/all/vars.yml
            - name: MLFLOW_S3_ENDPOINT_URL
              value: "S3_ENDPOINT_PLACEHOLDER"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: platform
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
