apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-artifacts-pvc
  namespace: platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres.zulip.svc.cluster.local 5432; do
                echo "Waiting for postgres..."; sleep 3
              done
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v3.1.0
          command:
            - /bin/sh
            - -c
            - |
              pip install psycopg2-binary --quiet && \
              mlflow server \
                --backend-store-uri postgresql://mlflow_user:${MLFLOW_POSTGRES_PASSWORD}@postgres.zulip.svc.cluster.local:5432/mlflow \
                --artifacts-destination /mlflow/artifacts \
                --serve-artifacts \
                --host 0.0.0.0 \
                --port 5000
          ports:
            - containerPort: 5000
          env:
            - name: MLFLOW_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-credentials
                  key: MLFLOW_POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 5
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /mlflow/artifacts
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-artifacts-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: platform
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
